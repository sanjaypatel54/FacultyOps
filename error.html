<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:#333;
        }

        .container{
            background:#fff;
            width:500px;
            max-width:90%;
            padding:40px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
        }

        h1{
            font-size:80px;
            color:#d32f2f;
        }

        h2{
            margin:15px 0;
            color:#444;
        }

        p{
            margin:20px 0;
            line-height:1.6;
            color:#666;
        }

        a{
            display:inline-block;
            margin-top:15px;
            padding:12px 25px;
            background:#0073e6;
            color:white;
            text-decoration:none;
            border-radius:5px;
            transition:0.3s;
        }

        a:hover{
            background:#0056b3;
        }

        .footer{
            margin-top:25px;
            font-size:14px;
            color:#888;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>404</h1>

    <h2>Oops! Page Not Found</h2>

    <p>
        The page you are looking for may have been moved,
        deleted, or the URL may be incorrect.
    </p>

    <a href="index.html">Return to Home</a>

    <div class="footer">
        &copy; 2026 Your Website. All Rights Reserved.
    </div>

</div>

</body>
</html>
