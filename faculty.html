<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Faculty Profiles</title><link rel="stylesheet" href="css/style.css"></head><body><div class="topbar"></div><header><h1>Faculty Profiles</h1><p>Computer Science & Engineering</p><nav><a href="index.html">Home</a><a class="active" href="faculty.html">Faculty</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav></header><main class="container" id="profiles"></main><footer>© 2026 FacultyOps</footer><script src="data.js"></script><script>profiles.innerHTML=faculty.map(f=>`<section class="profile" id="${f.name.toLowerCase().split(' ')[0]}"><aside class="side"><img src="${f.img}" alt="${f.name}"><h2>${f.name}</h2><div class="menu"><div>› Profile</div><div>› Publications</div><div>› Research Projects</div></div></aside><div><div class="facts"><div class="panel fact"><h3>Educational Qualification</h3><p>${f.qualification}</p><h3>Research Area</h3><p>${f.research}</p></div><div class="panel fact"><h3>Designation</h3><p>${f.designation}</p><h3>Department</h3><p>${f.department}</p></div><div class="panel fact"><h3>General Information</h3><p>${f.phone?`☎ ${f.phone}<br>`:''}📍 ${f.location}<br><br><a class="btn" href="contact.html">View Email</a></p></div></div><div class="panel"><h3 class="section-title">Specialisation</h3><p>${f.specialisation}</p></div><br><div class="panel"><h3 class="section-title">About</h3><p class="about-text">${f.about}</p></div></div></section>`).join('')</script></body></html>
